<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI-STUDIO | PRO RECORD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <style>
        :root { --main-color: #ffaa00; --cam-scale: 1; }
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* VIEWPORT DREPT PENTRU TIKTOK */
        #phone-container {
            position: relative;
            width: 320px; height: 568px; 
            background: #000; border: 2px solid #333; 
            overflow: hidden; flex-shrink: 0;
        }

        #viewport { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* KEN BURNS EFFECT */
        .slide-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.2s ease-in-out; transform: scale(1.1); }
        .slide-active { opacity: 1; animation: zoomEffect 10s infinite alternate ease-in-out; }
        @keyframes zoomEffect { from { transform: scale(1); } to { transform: scale(1.15); } }
        
        /* CAMERA & LOGO */
        #webcam-layer { position: absolute; width: 140px; height: 105px; z-index: 20; cursor: grab; transform: scale(var(--cam-scale)); touch-action: none; }
        #ai-canvas { width: 100%; height: 100%; object-fit: cover; }
        #circle-group { position: absolute; width: 200px; height: 200px; z-index: 15; cursor: grab; display: flex; align-items: center; justify-content: center; }
        #inner-circle { width: 110px; height: 110px; border: 3px solid var(--main-color); border-radius: 50%; z-index: 16; background: rgba(0,0,0,0.4); overflow: hidden; }
        #draggable-text { position: absolute; z-index: 30; cursor: grab; font-size: 18px; font-weight: 900; color: white; text-shadow: 2px 2px 5px #000; white-space: nowrap; padding: 5px; }

        /* UI */
        .ui-panel { margin-left: 20px; display: flex; flex-direction: column; gap: 8px; width: 280px; background: #111; padding: 15px; border: 1px solid #333; }
        .cube { background: #1a1a1a; padding: 10px; border: 1px solid #333; border-radius: 4px; }
        .rec-active { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        button { width: 100%; background: #333; color: white; padding: 8px; font-size: 11px; font-weight: bold; margin-bottom: 4px; border-radius: 4px; }
        .rec-btn { background: #dc2626 !important; }
        .save-btn { background: #2563eb !important; display: none; }
    </style>
</head>
<body>

    <div id="phone-container">
        <div id="viewport">
            <div id="slide-container">
                <img id="slide-1" class="slide-layer slide-active">
                <img id="slide-2" class="slide-layer">
            </div>
            <div id="webcam-layer" style="top:20px; left:20px; display:none;"><canvas id="ai-canvas"></canvas></div>
            <div id="circle-group" style="top:120px; left:60px;">
                <div id="inner-circle"><img id="inner-img" style="width:100%; height:100%; object-fit:cover; display:none; border-radius: 50%;"></div>
            </div>
            <div id="draggable-text" style="bottom:60px; left:40px;">WWW.RIBUILDING.RO</div>
        </div>
    </div>

    <div class="ui-panel">
        <div class="cube" style="border-color: #dc2626;">
            <h4>🔴 CONTROL RECORD</h4>
            <button id="btn-rec" class="rec-btn" onclick="toggleRecording()">START RECORDING</button>
            <div id="rec-status" style="font-size: 10px; text-align: center; margin-top: 5px;">
                Status: <span id="status-text">Ready</span> <span id="rec-dot" style="display:none;">●</span>
            </div>
            <div id="timer" style="text-align:center; font-weight:bold; font-size: 18px;">00:00</div>
            <button id="btn-save" class="save-btn" onclick="saveRecording()">💾 DESCARCĂ RECLAMA</button>
        </div>

        <div class="cube">
            <h4>1. SLIDESHOW</h4>
            <button onclick="document.getElementById('file-slides').click()">UPLOAD POZE</button>
            <input type="file" id="file-slides" multiple accept="image/*" style="display:none" onchange="loadSlides(this)">
            <button id="btn-slide" onclick="toggleSlideshow()">SLIDESHOW: OFF</button>
        </div>

        <div class="cube">
            <h4>2. CAMERĂ</h4>
            <button onclick="initCam()">START CAM</button>
            <button id="btn-ai" onclick="toggleAI()">AI CUT: OFF</button>
        </div>

        <div class="cube">
            <h4>3. DESIGN</h4>
            <button onclick="document.getElementById('file-inner').click()">LOAD LOGO</button>
            <input type="file" id="file-inner" style="display:none" onchange="loadInnerImage(this)">
            <input type="text" style="width:100%; background:#000; border:1px solid #333; color:white; padding:5px; font-size:11px;" placeholder="Text site..." oninput="updateText(this.value)">
        </div>
    </div>

    <video id="hidden-video" style="display:none" autoplay muted playsinline></video>

<script>
    let state = { isAI: false, isSlideshowActive: false, isRecording: false, slideTime: 4 };
    let slideshow = { files: [], idx: 0, int: null, currentLayer: 1 };
    let ai = { selfie: null, stream: null };
    let recorder, recordedChunks = [], timerInt, blobUrl;

    function loadSlides(i) {
        slideshow.files = Array.from(i.files).map(f => URL.createObjectURL(f));
        if(slideshow.files.length > 0) document.getElementById('slide-1').src = slideshow.files[0];
    }

    function changeSlide() {
        if (!state.isSlideshowActive || slideshow.files.length === 0) return;
        slideshow.idx = (slideshow.idx + 1) % slideshow.files.length;
        const oldLayer = document.getElementById(`slide-${slideshow.currentLayer}`);
        slideshow.currentLayer = slideshow.currentLayer === 1 ? 2 : 1;
        const newLayer = document.getElementById(`slide-${slideshow.currentLayer}`);
        newLayer.src = slideshow.files[slideshow.idx];
        newLayer.classList.add('slide-active');
        oldLayer.classList.remove('slide-active');
    }

    function toggleSlideshow() {
        state.isSlideshowActive = !state.isSlideshowActive;
        document.getElementById('btn-slide').classList.toggle('active', state.isSlideshowActive);
        if(state.isSlideshowActive) slideshow.int = setInterval(changeSlide, state.slideTime * 1000);
        else clearInterval(slideshow.int);
    }

    // --- FUNCTIA DE RECORDING REVIZUITĂ ---
    async function toggleRecording() {
        const btn = document.getElementById('btn-rec');
        const saveBtn = document.getElementById('btn-save');
        const statusTxt = document.getElementById('status-text');
        const dot = document.getElementById('rec-dot');

        if (state.isRecording) {
            // STOP
            recorder.stop();
            state.isRecording = false;
            btn.innerText = "START RECORDING";
            statusTxt.innerText = "Finalizat";
            dot.style.display = "none";
            clearInterval(timerInt);
        } else {
            // START
            recordedChunks = [];
            const viewport = document.getElementById('viewport');
            const stream = viewport.captureStream(30); // 30 FPS constant

            // Audio din camera/mic daca e activ
            if (ai.stream) {
                ai.stream.getAudioTracks().forEach(track => stream.addTrack(track));
            }

            // Detectare cel mai bun format
            const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
            let supportedType = types.find(t => MediaRecorder.isTypeSupported(t));

            try {
                recorder = new MediaRecorder(stream, { mimeType: supportedType });
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                        console.log("Date primite: ", e.data.size);
                    }
                };

                recorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    blobUrl = URL.createObjectURL(blob);
                    saveBtn.style.display = "block";
                };

                recorder.start(500); // Trimite date la fiecare jumatate de secunda
                state.isRecording = true;
                btn.innerText = "STOP RECORDING";
                statusTxt.innerText = "Înregistrare...";
                dot.style.display = "inline";
                dot.className = "rec-active";

                let s = 0;
                timerInt = setInterval(() => {
                    s++;
                    const m = Math.floor(s/60).toString().padStart(2,'0');
                    const sec = (s%60).toString().padStart(2,'0');
                    document.getElementById('timer').innerText = `${m}:${sec}`;
                }, 1000);

            } catch (err) {
                statusTxt.innerText = "Eroare: " + err.message;
            }
        }
    }

    function saveRecording() {
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `RECLAMA_RI_${Date.now()}.webm`;
        a.click();
    }

    // --- RESTUL FUNCTIILOR ---
    async function initCam() {
        ai.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hidden-video').srcObject = ai.stream;
        document.getElementById('webcam-layer').style.display = 'block';
        setupAI();
    }

    function setupAI() {
        ai.selfie = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
        ai.selfie.setOptions({ modelSelection: 1 });
        ai.selfie.onResults(res => {
            const c = document.getElementById('ai-canvas'), ctx = c.getContext('2d');
            c.width = res.image.width; c.height = res.image.height;
            ctx.clearRect(0,0,c.width,c.height);
            if(state.isAI) {
                ctx.globalCompositeOperation = 'copy';
                ctx.drawImage(res.segmentationMask, 0, 0, c.width, c.height);
                ctx.globalCompositeOperation = 'source-in';
            }
            ctx.drawImage(res.image, 0, 0, c.width, c.height);
        });
        const predict = async () => { await ai.selfie.send({image: document.getElementById('hidden-video')}); requestAnimationFrame(predict); };
        predict();
    }

    function toggleAI() { state.isAI = !state.isAI; document.getElementById('btn-ai').classList.toggle('active'); }
    function updateText(v) { document.getElementById('draggable-text').innerText = v; }
    function loadInnerImage(i) { if(i.files[0]) { document.getElementById('inner-img').src = URL.createObjectURL(i.files[0]); document.getElementById('inner-img').style.display = 'block'; } }

    function makeDraggable(el) {
        let sx, sy;
        el.onmousedown = e => {
            sx = e.clientX - el.offsetLeft; sy = e.clientY - el.offsetTop;
            document.onmousemove = me => { el.style.left = (me.clientX - sx) + 'px'; el.style.top = (me.clientY - sy) + 'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    }
    window.onload = () => { ['circle-group', 'webcam-layer', 'draggable-text'].forEach(id => makeDraggable(document.getElementById(id))); };
</script>
</body>
</html>
