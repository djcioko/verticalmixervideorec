<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV STUDIO PRO - SQUARE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <style>
        :root { --main-color: #ffaa00; --pulse: 1; --cerc-scale: 1; --cam-scale: 1; --text-scale: 1; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; 
        }

        /* CADRU DREPT (FARA ROTUNJIRI) */
        #phone-container {
            position: relative;
            width: 320px; /* Mai mic pentru vizibilitate pe laptop */
            height: 568px; 
            background: #000;
            border: 4px solid #333; /* Border discret, drept */
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        #viewport { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }

        .slide-layer {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: all 0.8s ease-in-out;
            filter: brightness(0.8);
        }
        .slide-active { opacity: 1; }
        
        /* LAYERS */
        #webcam-layer { position: absolute; width: 140px; height: 105px; z-index: 10; cursor: grab; transform: scale(var(--cam-scale)); touch-action: none; }
        #webcam-layer.in-circle { width: 120px !important; height: 120px !important; position: relative !important; z-index: 17; overflow: hidden; }
        #ai-canvas { width: 100%; height: 100%; object-fit: cover; }

        #circle-group { 
            position: absolute; width: 220px; height: 220px; z-index: 15; cursor: grab; 
            display: flex; align-items: center; justify-content: center;
            transform: scale(calc(var(--pulse) * var(--cerc-scale))); 
        }
        #radial-canvas { position: absolute; width: 300px; height: 300px; pointer-events: none; }
        #inner-circle { width: 120px; height: 120px; border: 3px solid var(--main-color); z-index: 16; background: #000; overflow: hidden; }

        #draggable-text { 
            position: absolute; z-index: 30; cursor: grab; font-size: 20px; font-weight: 900; 
            color: white; text-shadow: 0 0 10px var(--main-color); white-space: nowrap; 
            transform: scale(var(--text-scale)); padding: 5px;
        }

        /* UI PANEL */
        .ui-panel { margin-left: 20px; display: flex; flex-direction: column; gap: 10px; width: 300px; max-height: 95vh; overflow-y: auto; background: #111; padding: 15px; border: 1px solid #222; }
        .cube { background: #1a1a1a; padding: 10px; border: 1px solid #333; }
        h4 { font-size: 10px; color: var(--main-color); text-transform: uppercase; margin-bottom: 5px; }
        button { width: 100%; background: #333; color: white; padding: 7px; font-size: 11px; font-weight: bold; margin-bottom: 4px; border: 1px solid #444; }
        button.active { background: #059669 !important; }
        .rec-btn { background: #dc2626 !important; }
        .save-btn { background: #2563eb !important; display: none; }
        input[type="range"] { width: 100%; accent-color: var(--main-color); }
        #timer { font-family: monospace; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

    <div id="phone-container">
        <div id="viewport">
            <div id="slide-container">
                <img id="slide-1" class="slide-layer slide-active">
                <img id="slide-2" class="slide-layer">
            </div>
            <div id="webcam-layer" style="top:20px; left:20px;"><canvas id="ai-canvas"></canvas></div>
            <div id="circle-group" style="top:120px; left:50px;">
                <canvas id="radial-canvas" width="300" height="300"></canvas>
                <div id="inner-circle"><img id="inner-img" style="width:100%; height:100%; object-fit:cover; display:none;"></div>
            </div>
            <div id="draggable-text" style="bottom:60px; left:40px;">WWW.RIBUILDING.RO</div>
        </div>
    </div>

    <div class="ui-panel">
        <div class="cube" style="border-color: #dc2626;">
            <h4>🔴 Recording System</h4>
            <button id="btn-rec" class="rec-btn" onclick="toggleRecording()">START RECORD</button>
            <button id="btn-save" class="save-btn" onclick="saveRecording()">💾 DESCARCĂ CLIP (MP4)</button>
            <div id="rec-info" style="text-align:center; font-size:12px; display:none;">
                STATUS: <span id="timer">00:00</span>
            </div>
        </div>

        <div class="cube">
            <h4>1. Slideshow</h4>
            <input type="file" id="file-slides" multiple accept="image/*" style="display:none" onchange="loadSlides(this)">
            <button onclick="document.getElementById('file-slides').click()">UPLOAD POZE</button>
            <button id="btn-slide" onclick="toggleSlideshow()">SLIDE: OFF</button>
            <input type="range" min="1" max="15" value="5" oninput="state.slideTime = this.value">
        </div>

        <div class="cube">
            <h4>2. Camera AI</h4>
            <button onclick="initCam()" style="background:#444">START CAMERA</button>
            <button id="btn-ai" onclick="toggleAI()">AI CUT: OFF</button>
            <button id="btn-mode" onclick="toggleCamMode()">MOD: NORMAL</button>
            <input type="range" min="0.5" max="2.5" step="0.1" value="1" oninput="setCamScale(this.value)">
        </div>

        <div class="cube">
            <h4>3. Cerc & Audio</h4>
            <button id="btn-ic" onclick="toggleInnerImage()">IMG CERC: OFF</button>
            <input type="file" id="file-inner" style="display:none" onchange="loadInnerImage(this)">
            <button onclick="document.getElementById('file-inner').click()">LOAD LOGO</button>
            <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="setCercScale(this.value)">
        </div>

        <div class="cube">
            <h4>4. Personalizare</h4>
            <input type="text" id="text-input" placeholder="Text..." oninput="updateText(this.value)">
            <button onclick="location.reload()" style="background:#b91c1c; margin-top:10px;">RESET TOTAL</button>
        </div>
    </div>

    <video id="hidden-video" style="display:none" autoplay muted playsinline></video>

<script>
    let state = { mainColor: '#ffaa00', cercScale: 1, camScale: 1, isAI: false, isCamInCircle: false, isSlideshowActive: false, isRecording: false, slideTime: 5, innerImageVisible: false, pulse: 1 };
    let slideshow = { files: [], idx: 0, int: null, currentLayer: 1 };
    let audio = { ctx: null, analyzer: null, data: null };
    let ai = { selfie: null, stream: null };
    let recorder, recordedChunks = [], timerInt, startTime, blobUrl;

    // SLIDESHOW
    function changeSlide() {
        if (!state.isSlideshowActive || slideshow.files.length === 0) return;
        const nextIdx = (slideshow.idx + 1) % slideshow.files.length;
        const current = document.getElementById(`slide-${slideshow.currentLayer}`);
        slideshow.currentLayer = slideshow.currentLayer === 1 ? 2 : 1;
        const next = document.getElementById(`slide-${slideshow.currentLayer}`);
        next.src = slideshow.files[nextIdx];
        setTimeout(() => { next.classList.add('slide-active'); current.classList.remove('slide-active'); }, 50);
        slideshow.idx = nextIdx;
    }

    function toggleSlideshow() {
        state.isSlideshowActive = !state.isSlideshowActive;
        const btn = document.getElementById('btn-slide');
        btn.innerText = `SLIDE: ${state.isSlideshowActive ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active', state.isSlideshowActive);
        if(state.isSlideshowActive && slideshow.files.length > 0) {
            document.getElementById('slide-1').src = slideshow.files[0];
            slideshow.int = setInterval(changeSlide, state.slideTime * 1000);
        } else { clearInterval(slideshow.int); }
    }

    function loadSlides(i) { slideshow.files = Array.from(i.files).map(f => URL.createObjectURL(f)); }

    // RECORDING
    async function toggleRecording() {
        const btn = document.getElementById('btn-rec');
        const saveBtn = document.getElementById('btn-save');
        const info = document.getElementById('rec-info');

        if (state.isRecording) {
            recorder.stop();
            state.isRecording = false;
            btn.innerText = "START RECORD";
            clearInterval(timerInt);
            saveBtn.style.display = "block"; // Aratam butonul de salvare la final
        } else {
            recordedChunks = [];
            saveBtn.style.display = "none";
            const stream = document.getElementById('viewport').captureStream(30);
            if (ai.stream) ai.stream.getAudioTracks().forEach(track => stream.addTrack(track));
            
            const options = { mimeType: 'video/webm;codecs=vp9,opus' };
            recorder = new MediaRecorder(stream, options);
            recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            recorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                blobUrl = URL.createObjectURL(blob);
            };

            recorder.start();
            state.isRecording = true;
            btn.innerText = "STOP RECORD";
            info.style.display = "block";
            let s = 0;
            timerInt = setInterval(() => {
                s++;
                const m = Math.floor(s/60).toString().padStart(2,'0');
                const sec = (s%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${sec}`;
            }, 1000);
        }
    }

    function saveRecording() {
        if (!blobUrl) return;
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `MIXER-VIDEO-${Date.now()}.mp4`;
        a.click();
    }

    // CAMERA & AI
    async function initCam() {
        ai.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hidden-video').srcObject = ai.stream;
        setupAudio(ai.stream);
        setupAI();
    }

    function setupAI() {
        ai.selfie = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
        ai.selfie.setOptions({ modelSelection: 1 });
        ai.selfie.onResults(res => {
            const c = document.getElementById('ai-canvas'), ctx = c.getContext('2d');
            c.width = res.image.width; c.height = res.image.height;
            ctx.clearRect(0,0,c.width,c.height);
            if(state.isAI) {
                ctx.globalCompositeOperation = 'copy';
                ctx.drawImage(res.segmentationMask, 0, 0, c.width, c.height);
                ctx.globalCompositeOperation = 'source-in';
            }
            ctx.drawImage(res.image, 0, 0, c.width, c.height);
        });
        const predict = async () => { await ai.selfie.send({image: document.getElementById('hidden-video')}); requestAnimationFrame(predict); };
        predict();
    }

    function setupAudio(stream) {
        audio.ctx = new AudioContext();
        const source = audio.ctx.createMediaStreamSource(stream);
        audio.analyzer = audio.ctx.createAnalyser();
        source.connect(audio.analyzer);
        audio.data = new Uint8Array(audio.analyzer.frequencyBinCount);
        function draw() {
            audio.analyzer.getByteFrequencyData(audio.data);
            state.pulse = 1 + (audio.data[2]/255) * 0.12;
            document.documentElement.style.setProperty('--pulse', state.pulse);
            const ctx = document.getElementById('radial-canvas').getContext('2d');
            ctx.clearRect(0,0,300,300);
            ctx.strokeStyle = state.mainColor; ctx.lineWidth = 4;
            for(let i=0; i<30; i++) {
                let a = (i * Math.PI * 2) / 30, val = audio.data[i*2] * 0.4;
                ctx.beginPath();
                ctx.moveTo(150 + Math.cos(a)*60, 150 + Math.sin(a)*60);
                ctx.lineTo(150 + Math.cos(a)*(60+val), 150 + Math.sin(a)*(60+val));
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();
    }

    function makeDraggable(el) {
        let sx, sy;
        el.onmousedown = e => {
            sx = e.clientX - el.offsetLeft; sy = e.clientY - el.offsetTop;
            document.onmousemove = me => { el.style.left = (me.clientX - sx) + 'px'; el.style.top = (me.clientY - sy) + 'px'; };
            document.onmouseup = () => document.onmousemove = null;
        };
    }

    window.onload = () => { ['circle-group', 'webcam-layer', 'draggable-text'].forEach(id => makeDraggable(document.getElementById(id))); };
    function toggleAI() { state.isAI = !state.isAI; document.getElementById('btn-ai').classList.toggle('active'); }
    function setCamScale(v) { document.documentElement.style.setProperty('--cam-scale', v); }
    function setCercScale(v) { document.documentElement.style.setProperty('--cerc-scale', v); }
    function updateText(v) { document.getElementById('draggable-text').innerText = v; }
    function toggleCamMode() {
        state.isCamInCircle = !state.isCamInCircle;
        const w = document.getElementById('webcam-layer'), btn = document.getElementById('btn-mode');
        if(state.isCamInCircle) { w.classList.add('in-circle'); document.getElementById('inner-circle').appendChild(w); btn.innerText = "MOD: CERC"; } 
        else { w.classList.remove('in-circle'); document.getElementById('viewport').appendChild(w); btn.innerText = "MOD: NORMAL"; }
    }
    function toggleInnerImage() { state.innerImageVisible = !state.innerImageVisible; document.getElementById('inner-img').style.display = state.innerImageVisible ? 'block' : 'none'; document.getElementById('btn-ic').classList.toggle('active'); }
    function loadInnerImage(i) { if(i.files[0]) { document.getElementById('inner-img').src = URL.createObjectURL(i.files[0]); if(!state.innerImageVisible) toggleInnerImage(); } }
</script>
</body>
</html>
